<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CareGraph AI — Predictive Customer Care</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --bg-ink:#0A0E17;
    --bg-panel:#10161F;
    --bg-panel-2:#141B26;
    --border:#1E2733;
    --text-primary:#E8ECF1;
    --text-muted:#8791A3;
    --accent-cyan:#22D3B8;
    --accent-cyan-dim:rgba(34,211,184,0.15);
    --accent-amber:#F5A623;
    --accent-red:#EF5350;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  body{
    margin:0; background:var(--bg-ink); color:var(--text-primary);
    font-family:'Inter',sans-serif; min-height:100vh;
  }
  header{
    display:flex; align-items:center; justify-content:space-between;
    padding:20px 32px; border-bottom:1px solid var(--border);
  }
  .brand{display:flex; align-items:center; gap:12px;}
  .brand-mark{
    width:34px; height:34px; border-radius:8px;
    background:radial-gradient(circle at 30% 30%, var(--accent-cyan), #0d3b34);
    display:flex; align-items:center; justify-content:center;
    font-family:'Space Grotesk'; font-weight:700; font-size:15px; color:#04140F;
  }
  .brand-text h1{font-family:'Space Grotesk'; font-size:18px; margin:0; font-weight:600; letter-spacing:0.2px;}
  .brand-text p{margin:0; font-size:12px; color:var(--text-muted);}
  .track-pill{
    font-family:'JetBrains Mono'; font-size:11px; color:var(--accent-cyan);
    border:1px solid var(--accent-cyan-dim); background:var(--accent-cyan-dim);
    padding:5px 12px; border-radius:20px;
  }
  main{
    display:grid; grid-template-columns:1fr 380px; gap:1px; background:var(--border);
    min-height:calc(100vh - 76px);
  }
  .chat-col{background:var(--bg-ink); display:flex; flex-direction:column;}
  .side-col{background:var(--bg-ink); padding:24px; display:flex; flex-direction:column; gap:24px;}

  #messages{flex:1; padding:28px 32px; overflow-y:auto; display:flex; flex-direction:column; gap:16px;}
  .msg{max-width:78%; padding:13px 16px; border-radius:var(--radius); font-size:14.5px; line-height:1.55;}
  .msg.user{align-self:flex-end; background:var(--accent-cyan); color:#04140F; font-weight:500; border-bottom-right-radius:3px;}
  .msg.bot{align-self:flex-start; background:var(--bg-panel); border:1px solid var(--border); border-bottom-left-radius:3px;}
  .msg.bot .meta{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap;}
  .src-tag{
    font-family:'JetBrains Mono'; font-size:10.5px; color:var(--text-muted);
    border:1px solid var(--border); padding:3px 8px; border-radius:6px;
  }
  .src-tag.expanded{color:var(--accent-cyan); border-color:var(--accent-cyan-dim);}

  .composer{
    border-top:1px solid var(--border); padding:18px 32px; display:flex; gap:10px;
  }
  .composer input{
    flex:1; background:var(--bg-panel); border:1px solid var(--border); color:var(--text-primary);
    padding:13px 16px; border-radius:var(--radius); font-size:14px; font-family:'Inter';
  }
  .composer input:focus{outline:none; border-color:var(--accent-cyan);}
  .composer button{
    background:var(--accent-cyan); color:#04140F; border:none; padding:0 22px;
    border-radius:var(--radius); font-weight:600; font-size:14px; cursor:pointer; font-family:'Inter';
  }
  .composer button:hover{opacity:0.9;}
  .quick-row{padding:0 32px 14px; display:flex; gap:8px; flex-wrap:wrap;}
  .quick-btn{
    font-family:'JetBrains Mono'; font-size:11px; color:var(--text-muted);
    border:1px solid var(--border); background:var(--bg-panel); padding:6px 10px;
    border-radius:6px; cursor:pointer;
  }
  .quick-btn:hover{color:var(--accent-cyan); border-color:var(--accent-cyan-dim);}

  .panel{background:var(--bg-panel); border:1px solid var(--border); border-radius:var(--radius); padding:18px;}
  .panel h2{
    font-family:'Space Grotesk'; font-size:12px; text-transform:uppercase; letter-spacing:1px;
    color:var(--text-muted); margin:0 0 14px 0; font-weight:600;
  }

  /* Risk gauge */
  .gauge-wrap{display:flex; align-items:center; gap:16px;}
  #gauge-num{font-family:'JetBrains Mono'; font-size:28px; font-weight:500;}
  #gauge-label{font-family:'JetBrains Mono'; font-size:11px; color:var(--text-muted); text-transform:uppercase; margin-top:2px;}
  .action-line{
    margin-top:14px; padding-top:14px; border-top:1px solid var(--border);
    font-family:'JetBrains Mono'; font-size:11.5px; color:var(--text-muted);
  }
  .action-line span{color:var(--text-primary);}

  /* Graph viz */
  #graph-svg{width:100%; height:220px;}
  .node-circle{transition:all 0.4s ease;}
  .node-label{font-family:'JetBrains Mono'; font-size:8.5px; fill:var(--text-muted);}
  .edge-line{stroke:var(--border); stroke-width:1.2; transition:all 0.4s ease;}

  .signals-list{display:flex; flex-direction:column; gap:7px; margin-top:6px;}
  .signal-row{display:flex; justify-content:space-between; font-family:'JetBrains Mono'; font-size:11px; color:var(--text-muted);}
  .signal-row span.val{color:var(--text-primary);}

  ::-webkit-scrollbar{width:6px;}
  ::-webkit-scrollbar-thumb{background:var(--border); border-radius:3px;}
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">CG</div>
    <div class="brand-text">
      <h1>CareGraph AI</h1>
      <p>Graph-RAG customer care · with predictive escalation</p>
    </div>
  </div>
  <div class="track-pill">TRACK · CUSTOMER CARE BOT · FLOWZINT AI HACKATHON 2026</div>
</header>

<main>
  <div class="chat-col">
    <div id="messages"></div>
    <div class="quick-row">
      <button class="quick-btn" onclick="quick(this)">please help with refund timeline</button>
      <button class="quick-btn" onclick="quick(this)">payment failed AGAIN, still no refund, want this fixed NOW!!</button>
      <button class="quick-btn" onclick="quick(this)">my account got locked and I also need a refund</button>
    </div>
    <div class="composer">
      <input id="input" type="text" placeholder="Type a customer message…" onkeydown="if(event.key==='Enter') send()"/>
      <button onclick="send()">Send</button>
    </div>
  </div>

  <div class="side-col">
    <div class="panel">
      <h2>Escalation Risk</h2>
      <div class="gauge-wrap">
        <svg width="88" height="88" viewBox="0 0 88 88">
          <circle cx="44" cy="44" r="38" fill="none" stroke="#1E2733" stroke-width="8"/>
          <circle id="gauge-arc" cx="44" cy="44" r="38" fill="none" stroke="#22D3B8" stroke-width="8"
                  stroke-linecap="round" stroke-dasharray="238.7" stroke-dashoffset="238.7"
                  transform="rotate(-90 44 44)" style="transition:stroke-dashoffset 0.6s ease, stroke 0.6s ease;"/>
        </svg>
        <div>
          <div id="gauge-num">—</div>
          <div id="gauge-label">no message yet</div>
        </div>
      </div>
      <div class="action-line">suggested action → <span id="action-val">—</span></div>
      <div class="signals-list" id="signals-list"></div>
    </div>

    <div class="panel" style="flex:1;">
      <h2>Retrieval Graph (live)</h2>
      <svg id="graph-svg" viewBox="0 0 340 220"></svg>
      <div style="display:flex; gap:14px; margin-top:6px; font-family:'JetBrains Mono'; font-size:10px; color:var(--text-muted);">
        <span>● seed match</span>
        <span style="color:var(--accent-cyan);">● graph-expanded</span>
      </div>
    </div>
  </div>
</main>

<script>
const API = "http://localhost:8000";
let sessionId = null;

function addMessage(text, who, sources){
  const box = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = "msg " + who;
  div.textContent = text;
  if(sources && sources.length){
    const meta = document.createElement("div");
    meta.className = "meta";
    sources.forEach(s=>{
      const tag = document.createElement("span");
      tag.className = "src-tag" + (s.hop === "graph-expanded" ? " expanded" : "");
      tag.textContent = (s.hop === "graph-expanded" ? "↳ " : "") + s.title;
      meta.appendChild(tag);
    });
    div.appendChild(meta);
  }
  box.appendChild(div);
  box.scrollTop = box.scrollHeight;
}

function quick(btn){
  document.getElementById("input").value = btn.textContent;
  send();
}

async function send(){
  const input = document.getElementById("input");
  const text = input.value.trim();
  if(!text) return;
  addMessage(text, "user");
  input.value = "";

  try{
    const res = await fetch(API + "/chat", {
      method:"POST", headers:{"Content-Type":"application/json"},
      body: JSON.stringify({message: text, session_id: sessionId})
    });
    const data = await res.json();
    sessionId = data.session_id;
    addMessage(data.reply, "bot", data.sources);
    updateGauge(data.escalation, data.suggested_action);
    renderGraph(text);
  }catch(e){
    addMessage("Backend not reachable — make sure `uvicorn main:app` is running on :8000.", "bot");
  }
}

function updateGauge(escalation, action){
  const pct = escalation.escalation_probability;
  const circumference = 238.7;
  const offset = circumference * (1 - pct);
  const arc = document.getElementById("gauge-arc");
  arc.style.strokeDashoffset = offset;
  const color = pct >= 0.66 ? "#EF5350" : pct >= 0.35 ? "#F5A623" : "#22D3B8";
  arc.style.stroke = color;

  document.getElementById("gauge-num").textContent = Math.round(pct*100) + "%";
  document.getElementById("gauge-num").style.color = color;
  document.getElementById("gauge-label").textContent = escalation.risk_level + " risk";
  document.getElementById("action-val").textContent = action;

  const list = document.getElementById("signals-list");
  list.innerHTML = "";
  Object.entries(escalation.signals).forEach(([k,v])=>{
    const row = document.createElement("div");
    row.className = "signal-row";
    row.innerHTML = `<span>${k.replaceAll("_"," ")}</span><span class="val">${typeof v==="number" ? v.toFixed(2) : v}</span>`;
    list.appendChild(row);
  });
}

async function renderGraph(query){
  const res = await fetch(API + "/graph?query=" + encodeURIComponent(query));
  const data = await res.json();
  const svg = document.getElementById("graph-svg");
  svg.innerHTML = "";
  const n = data.nodes.length;
  if(n === 0) return;
  const cx = 170, cy = 110, r = 78;
  const positions = {};
  data.nodes.forEach((node, i)=>{
    const angle = (i / n) * 2 * Math.PI - Math.PI/2;
    positions[node.id] = { x: cx + r*Math.cos(angle), y: cy + r*Math.sin(angle) };
  });

  data.edges.forEach(e=>{
    const a = positions[e.source], b = positions[e.target];
    if(!a || !b) return;
    const line = document.createElementNS("http://www.w3.org/2000/svg","line");
    line.setAttribute("class","edge-line");
    line.setAttribute("x1",a.x); line.setAttribute("y1",a.y);
    line.setAttribute("x2",b.x); line.setAttribute("y2",b.y);
    svg.appendChild(line);
  });

  data.nodes.forEach(node=>{
    const p = positions[node.id];
    const color = node.type === "seed" ? "#F5A623" : "#22D3B8";
    const circle = document.createElementNS("http://www.w3.org/2000/svg","circle");
    circle.setAttribute("class","node-circle");
    circle.setAttribute("cx",p.x); circle.setAttribute("cy",p.y);
    circle.setAttribute("r", node.type === "seed" ? 9 : 6.5);
    circle.setAttribute("fill", color);
    svg.appendChild(circle);

    const label = document.createElementNS("http://www.w3.org/2000/svg","text");
    label.setAttribute("class","node-label");
    label.setAttribute("x", p.x);
    label.setAttribute("y", p.y + (p.y > cy ? 20 : -13));
    label.setAttribute("text-anchor","middle");
    const short = node.title.length > 20 ? node.title.slice(0,18)+"…" : node.title;
    label.textContent = short;
    svg.appendChild(label);
  });
}

addMessage("Hi, I'm CareGraph — I resolve tickets using a knowledge graph and flag anything at risk of escalating, in real time. Try one of the sample messages below, or type your own.", "bot");
</script>
</body>
</html>
